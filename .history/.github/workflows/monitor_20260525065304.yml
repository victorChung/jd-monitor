name: 京东图书降价监控

on:
  schedule:
    # 每小时的第5分钟运行一次（避免整点高峰）
    - cron: '5 * * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行监控脚本
        run: python monitor.py

      - name: 提交变更（如有新价格或 HTML）
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '自动更新价格报告'
          branch: main
          file_pattern: 'index.html prices.json'
